{% extends "base.html" %}

{% block title %}New meal plan — AIppetite{% endblock %}

{% block content %}
    <h1>New meal plan</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Generate plan</button>
    </form>
{% endblock %}
