{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}AIppetite{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="/">AIppetite</a>
        <nav class="main-nav">
            <a href="/">Home</a>
            {% if user.is_authenticated %}
                <a href="{% url 'bmi_calculator' %}">BMI</a>
                <a href="{% url 'tdee_calculator' %}">TDEE</a>
                <a href="{% url 'macro_calculator' %}">Macros</a>
                <a href="{% url 'generate_recipe' %}">Generate Recipe</a>
                <a href="{% url 'profile_edit' %}">Profile</a>
                <form action="{% url 'logout' %}" method="post" class="logout-form">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
            {% block nav %}{% endblock %}
        </nav>
    </header>

    <main class="site-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
