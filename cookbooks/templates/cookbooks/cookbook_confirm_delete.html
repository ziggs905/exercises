{% extends "base.html" %}

{% block title %}Delete {{ cookbook.name }} — AIppetite{% endblock %}

{% block content %}
    <h1>Delete "{{ cookbook.name }}"?</h1>
    <p>This cannot be undone. Recipes inside won't be deleted, just removed from this cookbook.</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Delete</button>
        <a href="{% url 'cookbook_detail' cookbook.pk %}">Cancel</a>
    </form>
{% endblock %}
